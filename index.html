<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Primary SEO -->
    <title>Nexovora | Creating Digital Excellence</title>

    <meta
      name="description"
      content="Nexovora provides Website Development, Portfolio Development, Graphic Design, QA Testing, Domain & Hosting, Resume & LinkedIn Optimization, and modern Digital Solutions for students, professionals, startups, and businesses."
    />

    <meta
      name="keywords"
      content="Nexovora, Website Development, Portfolio Website, Graphic Design, Branding, QA Testing, Software Testing, Domain, Hosting, Resume Design, LinkedIn Optimization, Digital Agency Pakistan"
    />

    <meta name="author" content="Nexovora" />

    <meta name="robots" content="index, follow" />

    <meta name="theme-color" content="#2563EB" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta
      property="og:title"
      content="Nexovora | Creating Digital Excellence"
    />

    <meta
      property="og:description"
      content="Helping students, professionals, startups, and businesses grow with modern websites, branding, QA, hosting, and digital solutions."
    />

    <meta property="og:image" content="/og-image.png" />

    <meta property="og:site_name" content="Nexovora" />

    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Nexovora | Creating Digital Excellence"
    />

    <meta
      name="twitter:description"
      content="Helping students, professionals, startups, and businesses grow with modern digital solutions."
    />

    <meta name="twitter:image" content="/og-image.png" />

    <!-- Canonical URL (Update after buying your domain) -->
    <link rel="canonical" href="https://nexovora.com/" />
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this application.
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
